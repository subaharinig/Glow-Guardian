<!DOCTYPE html>
<html>
<head>
    <title>Face Analysis</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            width: 350px;
            margin: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .result-box {
            text-align: left;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
        }

        .error { color: red; }
        .loading { color: orange; }
        .success { color: green; }

    </style>
</head>

<body>

<h2>🧠 Face Analysis</h2>

<div class="card">

    <input type="file" id="imageInput"><br><br>

    <button onclick="analyzeFace()">Analyze</button>

    <img id="preview" style="display:none;">

    <!-- ✅ STATUS FIX -->
    <p id="status" class="status"></p>

    <div class="result-box" id="resultBox" style="display:none;">
        <p><strong>Issue:</strong> <span id="issue"></span></p>
        <p><strong>Skin Type:</strong> <span id="skinType"></span></p>
        <p><strong>Tan Level:</strong> <span id="tan"></span></p>
        <p><strong>Wrinkles:</strong> <span id="wrinkles"></span></p>

        <h4>💡 Recommendations:</h4>
        <ul id="recommendationList"></ul>
    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
