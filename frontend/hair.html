<!DOCTYPE html>
<html>
<head>
    <title>Hair Analysis</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
        }

        .result-box {
            text-align: left;
            margin-top: 15px;
        }

        ul {
            padding-left: 20px;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: black;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #333;
        }
    </style>
</head>

<body>

<h2>💇 Hair Analysis</h2>

<div class="card">

    <input type="file" id="imageInput"><br><br>

    <button onclick="analyzeHair()">Analyze Hair</button>

    <img id="preview" style="display:none;">

    <div class="result-box" id="resultBox" style="display:none;">
        <p><strong>Hair Type:</strong> <span id="hairType"></span></p>
        <p><strong>Frizz:</strong> <span id="frizz"></span></p>
        <p><strong>Damage:</strong> <span id="damage"></span></p>
        <p><strong>Dandruff:</strong> <span id="dandruff"></span></p>

        <h4>💡 Recommendations:</h4>
        <ul id="recommendationList"></ul>
    </div>

</div>

<script src="js/script.js"></script>

</body>
</html>
